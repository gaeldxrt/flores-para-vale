<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para ti, mi amor 💛</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            overflow: hidden;
            background: #fff9e6;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; 
            position: relative;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(at 10% 10%, rgba(255, 235, 150, 0.7) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(255, 220, 120, 0.5) 0px, transparent 50%),
                linear-gradient(135deg, #fff9e6 0%, #fae6b1 100%);
            z-index: 0; animation: backgroundShimmer 10s infinite alternate;
        }

        #pantalla-inicio {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffe066;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1s ease, visibility 1s; padding: 20px;
        }

        .btn-empezar {
            background: linear-gradient(135deg, #ffc800, #ffa600); color: white; border: 3px solid #fff;
            padding: 20px 60px; font-size: 1.8rem; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 15px 35px rgba(255, 170, 0, 0.6); animation: latido 1.5s infinite; transition: transform 0.2s;
        }
        .btn-empezar:active { transform: scale(0.95); }

        .bouquet-cluster {
            position: absolute; bottom: -20px; z-index: 20; pointer-events: none;
            filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.2)); animation: aparecerRamos 2.5s ease-out;
            display: flex; align-items: flex-end;
        }
        .bouquet-left { left: -50px; }
        .bouquet-right { right: -50px; transform: scaleX(-1); }

        .flower-asset { position: absolute; bottom: 0; }
        .f-main { width: 320px; z-index: 3; transform: rotate(-5deg); left: 0; }
        .f-back-1 { width: 260px; z-index: 1; transform: rotate(-25deg); left: 70px; bottom: 20px; opacity: 0.8; }
        .f-back-2 { width: 240px; z-index: 2; transform: rotate(15deg); left: -40px; bottom: 10px; opacity: 0.9; }

        .carta {
            display: none; position: relative; background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.8); padding: 50px 35px; border-radius: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1), inset 0 0 30px rgba(255, 255, 255, 0.6);
            width: 92%; max-width: 440px; z-index: 10; text-align: center;
            animation: flotarCarta 5s infinite ease-in-out; border-bottom: 4px solid rgba(212, 175, 55, 0.3);
        }

        .carta::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg); pointer-events: none; animation: glassShine 6s infinite;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3.6rem; color: #4a3f12; margin: 0 0 20px 0; animation: pulsatingText 3s infinite; }
        p { color: #5c4514; font-size: 1.2rem; line-height: 1.7; font-weight: 600; margin-bottom: 30px; }
        #contador {
            background: linear-gradient(to right, rgba(255, 248, 220, 0.8), rgba(255, 235, 150, 0.8));
            border: 2px solid rgba(212, 175, 55, 0.5); padding: 20px; border-radius: 15px; font-size: 1.15rem;
            font-weight: bold; color: #4a3f12; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .reproductor { font-size: 0.95rem; color: #7a6040; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 12px; font-style: italic; }
        .particula { position: absolute; z-index: 5; pointer-events: none; animation: caerMágico linear infinite; }

        /* Ajustes para Móvil */
        @media (max-width: 768px) {
            .carta { padding: 30px 20px; max-height: 85vh; overflow-y: auto; width: 95%; }
            h1 { font-size: 2.8rem; margin-bottom: 15px; } 
            p { font-size: 1.05rem; line-height: 1.5; margin-bottom: 20px; } 
            #contador { padding: 15px; font-size: 1rem; margin-bottom: 20px; }
            .reproductor { font-size: 0.85rem; }
            
            .bouquet-cluster { bottom: -15px; }
            .bouquet-left { left: -25px; }
            .bouquet-right { right: -25px; }
            .f-main { width: 170px; }
            .f-back-1 { width: 130px; left: 40px; }
            .f-back-2 { width: 120px; left: -15px; }

            .btn-empezar { font-size: 1.4rem; padding: 15px 40px; }
        }

        @keyframes backgroundShimmer { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }
        @keyframes caerMágico { 0% { transform: translateY(-120px) rotate(0deg) translateX(0) scale(0.6); opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { transform: translateY(105vh) rotate(400deg) translateX(30px) scale(1.3); opacity: 0; } }
        @keyframes flotarCarta { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(1deg); } }
        @keyframes aparecerRamos { 0% { transform: translateY(150px) scale(0.9); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes pulsatingText { 0%, 100% { text-shadow: 0 0 5px rgba(212, 136, 0, 0.4); } 50% { text-shadow: 0 0 15px rgba(212, 136, 0, 0.8); } }
        @keyframes glassShine { 0% { left: -150%; } 100% { left: 150%; } }
        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <h1 style="color: #4a3f12; text-align: center; font-family: 'Dancing Script'; margin-bottom: 20px;">Tengo algo mágico para ti... 🌻💖</h1>
    <button class="btn-empezar" onclick="iniciarRegalo()">Abrir con amor 💛</button>
</div>

<div class="bouquet-cluster bouquet-left">
    <img src="girasol.png" class="flower-asset f-back-2" alt="flor">
    <img src="girasol.png" class="flower-asset f-back-1" alt="flor">
    <img src="girasol.png" class="flower-asset f-main" alt="girasol">
</div>

<div class="bouquet-cluster bouquet-right">
    <img src="girasol.png" class="flower-asset f-back-2" alt="flor">
    <img src="girasol.png" class="flower-asset f-back-1" alt="flor">
    <img src="girasol.png" class="flower-asset f-main" alt="girasol">
</div>

<div class="carta" id="contenido">
    <h1>Sandy 💛</h1>
    <p>
        Para ti, mi amor 🥺💛<br><br>
        Gracias por llegar a mi vida y cambiarlo todo.<br><br>
        Hoy quería darte algo especial...<br>
        flores amarillas para recordarte que siempre estoy contigo 🌻✨<br><br>
        Te amo más de lo que las palabras pueden explicar 💛
    </p>

    <div id="contador"></div>

    <div class="reproductor">🎵 Escuchando: Accidentally In Love</div>
</div>

<audio id="musica" loop preload="auto">
    <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>
    function iniciarRegalo() {
        const audio = document.getElementById("musica");
        const inicio = document.getElementById("pantalla-inicio");
        const carta = document.getElementById("contenido");

        audio.play().catch(e => console.log("Error de audio:", e));

        inicio.style.opacity = "0";
        setTimeout(() => {
            inicio.style.visibility = "hidden";
            carta.style.display = "block";
            setInterval(crearParticula, 280); 
        }, 800);
    }

    const elementosMagicos = ["🌻", "🌼", "🌹", "✨", "💛", "💖", "🍃"];
    function crearParticula() {
        const p = document.createElement("div");
        p.classList.add("particula");
        p.innerText = elementosMagicos[Math.floor(Math.random() * elementosMagicos.length)];
        p.style.left = Math.random() * 100 + "vw";
        p.style.fontSize = (Math.random() * 25 + 15) + "px";
        p.style.animationDuration = (Math.random() * 3 + 5) + "s"; 
        p.style.animationDelay = (Math.random() * 2) + "s";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 8000);
    }

    // CONTADOR: Actualmente configurado a 341 días
    const fechaBase = new Date();
    fechaBase.setDate(fechaBase.getDate() - 341);

    function actualizar() {
        const diff = new Date() - fechaBase;
        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000) % 24;
        const m = Math.floor(diff / 60000) % 60;
        const s = Math.floor(diff / 1000) % 60;
        document.getElementById("contador").innerHTML = 
            `Desde que comenzó nuestra historia 💛<br>${d} días ${h} hrs ${m} min ${s} seg`;
    }
    setInterval(actualizar, 1000);
    actualizar();
</script>
</body>
</html>
