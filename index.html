<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Vale y Madison 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0; overflow: hidden;
        background: linear-gradient(135deg, #fdfbfb 0%, #ffe066 100%);
        font-family: 'Quicksand', sans-serif;
        display: flex; justify-content: center; align-items: center;
        height: 100vh; position: relative;
    }
    #pantalla-inicio {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: #ffe066; display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 50;
        transition: opacity 1s ease;
    }
    .btn-empezar {
        background: #ffaa00; color: white; border: none; padding: 15px 40px;
        font-size: 1.5rem; font-weight: bold; border-radius: 50px;
        cursor: pointer; box-shadow: 0 10px 20px rgba(255, 170, 0, 0.4);
        animation: latido 1.5s infinite;
    }
    .ramo {
        position: absolute; bottom: -15px; width: 190px;
        z-index: 15; filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.2));
        pointer-events: none;
    }
    @media (min-width: 768px) { .ramo { width: 380px; } }
    .ramo-izquierdo { left: -30px; transform: rotate(10deg); }
    .ramo-derecho { right: -30px; transform: rotate(-10deg) scaleX(-1); }
    .carta {
        display: none; background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.7); padding: 30px 20px;
        border-radius: 25px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        width: 92%; max-width: 400px; z-index: 10; text-align: center;
    }
    h1 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #b36b00; margin-bottom: 15px; }
    p { color: #4a3f35; font-size: 1.1rem; line-height: 1.6; font-weight: 600; }
    #contador { background: rgba(255, 215, 0, 0.35); padding: 12px; border-radius: 15px; font-weight: bold; color: #8a5a00; margin: 15px 0; }
    .reproductor { font-size: 0.85rem; color: #7a6040; font-style: italic; }
    .flor-cayendo { position: absolute; z-index: 5; animation: caer linear infinite; }
    @keyframes caer {
        0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
        10% { opacity: 1; }
        100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }
    @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
</style>
</head>
<body>
<div id="pantalla-inicio">
    <h1 style="color: #d48800;">Para mis niñas...</h1>
    <button class="btn-empezar" onclick="iniciar()">Abrir regalo 💛</button>
</div>
<img src="https://cdn.pixabay.com/photo/2017/08/01/10/44/sunflower-2564295_1280.png" class="ramo ramo-izquierdo">
<img src="https://cdn.pixabay.com/photo/2017/08/01/10/44/sunflower-2564295_1280.png" class="ramo ramo-derecho">
<div class="carta" id="contenido">
    <h1>🌼 Vale y Madison 💛</h1>
    <p>
        Para ustedes, mi vida entera 🥺💛<br><br>
        Vale… gracias por llegar a mi vida y cambiarlo todo.<br>
        Y tú, Madison… ya eres lo más importante para mí 👶💛<br><br>
        Flores amarillas para recordarles que siempre estoy con ustedes 🌻✨
    </p>
    <div id="contador"></div>
    <div class="reproductor">🎧 Sonando: 'Accidentally In Love'</div>
</div>
<audio id="musica" loop><source src="cancion.mp3" type="audio/mpeg"></audio>
<script>
    function iniciar() {
        document.getElementById("musica").play();
        document.getElementById("pantalla-inicio").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("pantalla-inicio").style.display = "none";
            document.getElementById("contenido").style.display = "block";
            setInterval(crearFlor, 350);
        }, 800);
    }
    const flores = ["🌻", "🌼", "💛", "✨", "🌹"];
    function crearFlor() {
        const f = document.createElement("div");
        f.classList.add("flor-cayendo");
        f.innerText = flores[Math.floor(Math.random()*flores.length)];
        f.style.left = Math.random() * 100 + "vw";
        f.style.fontSize = (Math.random() * 25 + 15) + "px";
        f.style.animationDuration = (Math.random() * 3 + 5) + "s";
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 8000);
    }
    const inicio = new Date();
    inicio.setDate(inicio.getDate() - 336);
    function actualizar() {
        const diff = new Date() - inicio;
        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000) % 24;
        const m = Math.floor(diff / 60000) % 60;
        const s = Math.floor(diff / 1000) % 60;
        document.getElementById("contador").innerHTML = `Desde que comenzó nuestra historia 💛<br>${d}d ${h}h ${m}m ${s}s`;
    }
    setInterval(actualizar, 1000);
    actualizar();
</script>
</body>
</html>
